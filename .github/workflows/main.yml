name: Build APK

on:
  push:
    branches:
      - main

# Node.js uyarılarını kapatmak için çevre değişkeni
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: ZIP Dosyasını Sorunsuz Çıkar
        run: |
          if [ -f *"Bahşiş"*.zip ] || [ -f *.zip ]; then
            unzip -o *.zip
            rm *.zip
          fi

      - name: İmza Dosyasını (Keystore) Hazırla
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ -f "app/debug.keystore.base64" ]; then
            base64 -d app/debug.keystore.base64 > debug.keystore
          else
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Gradle Ortamını Hazırla ve KSP Hafızasını Temizle
        run: |
          gradle wrapper
          chmod +x ./gradlew
          
          # Hata Çözümü 1. Adım: Askıda kalan tüm arka plan servislerini durdur
          ./gradlew --stop
          
          # Hata Çözümü 2. Adım: Hatalı önbellekleri ve eski build dosyalarını sil
          ./gradlew clean

      - name: Temiz APK Oluştur
        run: |
          # Hata Çözümü 3. Adım: Daemon (arka plan) olmadan ve önbelleği atlayarak tertemiz derle
          ./gradlew assembleDebug --no-daemon --no-build-cache

      - name: APK yükle
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          
