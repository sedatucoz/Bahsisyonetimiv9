name: Android CI/CD v3

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    name: Build & Test Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Prepare Local Environment
        run: |
          # Secrets Gradle Plugin'inin hata vermesini önlemek için .env.example dosyasını .env olarak kopyalar
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "GEMINI_API_KEY=dummy_key_for_ci_build" > .env
          fi

      - name: Grant Executable Permissions to Gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest
        continue-on-error: true # Test hatası durumunda dahi APK derlemesini engellemez

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BahsisApp-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BahsisApp-Release-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
